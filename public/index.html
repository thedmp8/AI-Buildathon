<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT API Website</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="finder-stack">
        <section class="finder-panel" aria-label="Search courses">
          <header class="finder-header">
            <div>
              <p class="eyebrow">Course Finder</p>
              <h2>Search course codes or names</h2>
            </div>
            <span class="finder-count" id="course-count">Loading</span>
          </header>

          <div class="finder-search">
            <label class="sr-only" for="course-search-input">Search courses</label>
            <input
              id="course-search-input"
              type="search"
              placeholder="Try COMP, MATH2322, accounting, psychology"
              autocomplete="off"
            >
          </div>

          <div class="preference-builder" aria-label="Selected course and elective preferences">
            <div class="preference-header">
              <strong>Preferences</strong>
              <span id="preference-count">0 / 8 selected</span>
            </div>
            <div class="preference-list" id="preference-list"></div>
          </div>

          <div class="finder-results" id="course-results" aria-live="polite"></div>
        </section>

        <section class="finder-panel" aria-label="Search ANU exchange programs">
          <header class="finder-header">
            <div>
              <p class="eyebrow">Exchange Finder</p>
              <h2>Search ANU exchange programs</h2>
            </div>
            <span class="finder-count" id="program-count">Loading</span>
          </header>

          <div class="finder-search">
            <label class="sr-only" for="program-search-input">Search exchange programs</label>
            <input
              id="program-search-input"
              type="search"
              placeholder="Try Japan, Copenhagen, Bocconi"
              autocomplete="off"
            >
          </div>

          <div class="finder-results" id="program-results" aria-live="polite"></div>
        </section>
      </aside>

      <section class="chat-panel" aria-label="Chat with ChatGPT">
        <header class="chat-header">
          <div>
            <p class="eyebrow">OpenAI Responses API</p>
            <h1>ChatGPT API Website</h1>
          </div>
          <span class="status-pill" id="status-pill">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="status-text">Ready</span>
          </span>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chat-form">
          <label class="sr-only" for="message-input">Message</label>
          <textarea
            id="message-input"
            name="message"
            rows="1"
            placeholder="Ask a question"
            autocomplete="off"
          ></textarea>
          <button type="submit" id="send-button">Send</button>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
